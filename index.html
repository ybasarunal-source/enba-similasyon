    <!-- Kritik Yükleme Ekranı Stilleri (Gecikmeyi önlemek için inline) -->
    <style>
        .splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1A1A1A;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .splash-screen.hidden { opacity: 0; visibility: hidden; }
        .splash-content { text-align: center; width: 280px; }
        .splash-logo {
            display: flex; justify-content: center; align-items: baseline;
            gap: 5px; margin-bottom: 30px;
            animation: splashPulse 2s infinite ease-in-out;
        }
        .splash-logo .enba { font-family: 'Manrope', sans-serif; font-weight: 800; color: #E35205; font-size: 32px; letter-spacing: -1px; }
        .splash-logo .recycling { font-family: 'Manrope', sans-serif; font-weight: 400; color: #ffffff; font-size: 24px; }
        .loader-wrapper { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.05); border-radius: 2px; overflow: hidden; margin-bottom: 15px; }
        .loader-bar {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, #E35205, transparent);
            background-size: 200% 100%;
            animation: loaderMove 1.5s infinite linear;
        }
        .splash-status { font-size: 11px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        @keyframes splashPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.02); opacity: 0.9; } }
        @keyframes loaderMove { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>

    <link rel="stylesheet" href="style.css?v=2.1">
</head>

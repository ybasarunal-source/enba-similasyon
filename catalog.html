idth(0.5);doc.line(mg+1,y+1,mg+1,y+nh-1);doc.setTextColor(80,80,80);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.text(t('pdf_notes'),mg+4,y+5);doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);for(var k=0;k<lines.length;k++)doc.text(lines[k],mg+4,y+10+k*5);y+=nh+4;}var imgs=imgData[i];if(imgs&&imgs.length){cp(8);doc.setFillColor(240,240,240);doc.rect(mg,y,cw,6,'F');doc.setTextColor(80,80,80);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.text(t('det_photos').toUpperCase(),mg+3,y+4.5);y+=8;var maxImgH=55;var gap=3;var perRow=3;var imgW=(cw-(perRow-1)*gap)/perRow;var rowStartY=y;for(var j=0;j<imgs.length;j++){if(j>0&&j%perRow===0){y+=maxImgH+gap;cp(maxImgH+4);rowStartY=y;}var x=mg+(j%perRow)*(imgW+gap);var im=imgs[j];var scale=Math.min(imgW/im.pw,maxImgH/im.ph);var dw=im.pw*scale;var dh=im.ph*scale;var ox=x+(imgW-dw)/2;try{doc.addImage(im.b64,'JPEG',ox,y,dw,dh);}catch(e){}doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);doc.rect(ox,y,dw,dh,'S');}y+=maxImgH+gap;}y+=6;if(i<sel.length-1){cp(4);doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);doc.line(mg,y,pw-mg,y);y+=6;}}var pc=doc.internal.getNumberOfPages();for(var n=1;n<=pc;n++){doc.setPage(n);doc.setFontSize(8);doc.setTextColor(160,160,160);doc.setFont('helvetica','normal');doc.text(t('pdf_footer'),mg,292);doc.text(n+' / '+pc,pw-mg,292,{align:'right'});}doc.save('ENBA_'+t('nav_catalog')+'.pdf');}

function exportZip(){var sel=getSelected();if(!sel.length)return;var has=false;for(var i=0;i<sel.length;i++){if(sel[i].photos&&sel[i].photos.length){has=true;break;}}if(!has){alert(t('no_photos'));return;}var btn=qs('btnZip');var orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:#fff;flex-shrink:0"><path d="M20,6H12L10,4H4A2,2 0 0,0 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V8A2,2 0 0,0 20,6M20,18H4V6H9.17L11.17,8H20V18Z"/></svg>'+t('zip_prep');setTimeout(function(){try{var zip=new JSZip();var nc={};for(var i=0;i<sel.length;i++){var p=sel[i];if(!p.photos||!p.photos.length)continue;var d=gd(p);var bn=slugify(d.name)||('prod_'+p.id);if(nc[bn]){nc[bn]++;bn=bn+'_'+nc[bn];}else{nc[bn]=1;}var folder=zip.folder(bn);for(var j=0;j<p.photos.length;j++){var du=p.photos[j];var m=du.match(/^data:image\/(\w+);base64,(.+)$/);if(!m)continue;var ext=m[1]==='jpeg'?'jpg':m[1];folder.file(bn+(p.photos.length>1?'_'+(j+1):'')+'.'+ext,m[2],{base64:true});}}zip.generateAsync({type:'blob'}).then(function(content){var url=URL.createObjectURL(content);var a=document.createElement('a');a.href=url;a.download='ENBA_Photos.zip';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url);},2000);btn.innerHTML=orig;btn.disabled=false;updateSelUI();});}catch(err){alert(err.message);btn.innerHTML=orig;btn.disabled=false;updateSelUI();}},50);}

/* ===== SETTINGS ===== */
var COLORS = [
  {key:'or', bg:'var(--opp)', color:'var(--or)', border:'var(--opm)', dot:'#E8600A'},
  {key:'dk', bg:'#f0f0f0',    color:'#333',       border:'#ddd',       dot:'#555'},
  {key:'bl', bg:'#e8f0fe',    color:'#1a56b0',    border:'#b3c8f5',    dot:'#1a56b0'},
  {key:'gr', bg:'#e8f7ee',    color:'#1a6b3a',    border:'#a3d9b5',    dot:'#1a6b3a'},
  {key:'pu', bg:'#f3e8fe',    color:'#6b21a8',    border:'#d8b4fe',    dot:'#7c3aed'},
  {key:'re', bg:'#fde8e8',    color:'#9b1c1c',    border:'#f9b0b0',    dot:'#e02424'},
];

function getColorByKey(k){ return COLORS.find(function(c){return c.key===k;}) || COLORS[0]; }

function saveSections(){
  var data = SECS.map(function(s){ return {key:s.key, label:s.label, col:s.col, cats:s.cats}; });
  try{localStorage.setItem('enba_secs', JSON.stringify(data));}catch(e){}
}

function loadSections(){
  try{
    var r = localStorage.getItem('enba_secs');
    if(r){
      var data = JSON.parse(r);
      SECS = data.map(function(s){
        return {key:s.key, label:s.label||s.key, col:s.col||'sor', cats:s.cats||[]};
      });
    } else {
      // Set default labels if not stored
      SECS[0].label = SECS[0].label || 'Material Type';
      SECS[1].label = SECS[1].label || 'Material Form';
      SECS[2].label = SECS[2].label || 'Packaging';
    }
  }catch(e){}
}

function renderSettings(){
  var el = qs('sectionsList');
  if(!el) return;
  var html = '';
  for(var i=0; i<SECS.length; i++){
    var s = SECS[i];
    var clr = getColorByKey(s.col);
    // Color dots
    var dots = COLORS.map(function(c){
      return '<div class="color-dot'+(s.col===c.key?' on':'')+'" data-col="'+c.key+'" data-secidx="'+i+'" style="background:'+c.dot+';" title="'+c.key+'"></div>';
    }).join('');
    // Tags
    var tags = '';
    if(s.cats.length){
      tags = s.cats.map(function(cat, ci){
        return '<div class="tag-item" data-secidx="'+i+'" data-catidx="'+ci+'" style="background:'+clr.bg+';color:'+clr.color+';border:1px solid '+clr.border+';">'
          +'<span class="tag-lbl">'+eH(cat)+'</span>'
          +'<button class="tag-rm" data-secidx="'+i+'" data-catidx="'+ci+'">&#10005;</button>'
          +'</div>';
      }).join('');
    } else {
      tags = '<div class="sec-empty" id="secEmpty-'+i+'">No tags yet.</div>';
    }

    html += '<div class="sec-card" data-secidx="'+i+'">'
      +'<div class="sec-hd">'
        +'<div class="sec-hd-left">'
          +'<input class="sec-name-input" data-secidx="'+i+'" value="'+eH(s.label||s.key)+'" placeholder="Section name...">'
          +'<div class="sec-color-pick">'+dots+'</div>'
        +'</div>'
        +'<button class="sec-del-btn" data-secidx="'+i+'" title="Bolumu sil">&#10005;</button>'
      +'</div>'
      +'<div class="sec-body">'
        +'<div class="tag-list" id="tagList-'+i+'">'+tags+'</div>'
        +'<div class="tag-add-row">'
          +'<input class="tag-add-input" id="tagInput-'+i+'" placeholder="New tag..." data-secidx="'+i+'">'
          +'<button class="tag-add-btn" data-secidx="'+i+'">+ Ekle</button>'
        +'</div>'
      +'</div>'
      +'</div>';
  }
  el.innerHTML = html;

  // Bind events
  // Section name change
  el.querySelectorAll('.sec-name-input').forEach(function(inp){
    inp.addEventListener('input', function(){
      var idx = parseInt(inp.dataset.secidx);
      SECS[idx].label = inp.value;
      saveSections();
      applyUI(); // refresh form labels
    });
  });

  // Color dot click
  el.querySelectorAll('.color-dot').forEach(function(dot){
    dot.addEventListener('click', function(){
      var idx = parseInt(dot.dataset.secidx);
      SECS[idx].col = dot.dataset.col;
      saveSections();
      renderSettings();
      rTags(); // refresh form tag colors
    });
  });

  // Delete section
  el.querySelectorAll('.sec-del-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var idx = parseInt(btn.dataset.secidx);
      var secName = SECS[idx].label || SECS[idx].key;
      if(!confirm('Delete section "'+secName+'"? All associated tags will be removed from products.')) return;
      // Remove from all products
      var secKey = SECS[idx].key;
      var raw = getRaw();
      raw.forEach(function(p){ if(p.sel&&p.sel[secKey]) delete p.sel[secKey]; });
      saveRaw(raw);
      SECS.splice(idx, 1);
      saveSections();
      buildProds();
      renderSettings();
      renderAdmin();
      rTags();
    });
  });

  // Remove tag
  el.querySelectorAll('.tag-rm').forEach(function(btn){
    btn.addEventListener('click', function(){
      var si = parseInt(btn.dataset.secidx);
      var ci = parseInt(btn.dataset.catidx);
      var removed = SECS[si].cats[ci];
      SECS[si].cats.splice(ci, 1);
      // Remove from products
      var raw = getRaw();
      raw.forEach(function(p){
        var key = SECS[si].key;
        if(p.sel&&p.sel[key]){var i=p.sel[key].indexOf(removed);if(i>=0)p.sel[key].splice(i,1);}
      });
      saveRaw(raw);
      saveSections();
      buildProds(); render();
      renderSettings();
      rTags();
    });
  });

  // Add tag button
  el.querySelectorAll('.tag-add-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var si = parseInt(btn.dataset.secidx);
      addTagToSection(si);
    });
  });

  // Add tag on Enter
  el.querySelectorAll('.tag-add-input').forEach(function(inp){
    inp.addEventListener('keydown', function(e){
      if(e.key==='Enter'){
        var si = parseInt(inp.dataset.secidx);
        addTagToSection(si);
      }
    });
  });
}

function addTagToSection(si){
  var inp = qs('tagInput-'+si);
  var val = inp ? inp.value.trim() : '';
  if(!val) return;
  if(SECS[si].cats.indexOf(val) < 0) SECS[si].cats.push(val);
  inp.value = '';
  saveSections();
  renderSettings();
  rTags();
}

function addNewSection(){
  var key = 'sec_' + Date.now();
  SECS.push({key:key, label:'New Section', col:'or', cats:[]});
  saveSections();
  renderSettings();
  // Scroll to new section
  var el = qs('sectionsList');
  if(el) el.lastElementChild && el.lastElementChild.scrollIntoView({behavior:'smooth'});
}

loadStorage();buildProds();bindAll();applyUI();render();
})();
</script>

<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1400" />
<title>Bold · görev yönetimi (önizleme)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Geist', sans-serif; }
  * { box-sizing: border-box; }
  .stage { display: flex; flex-wrap: wrap; gap: 32px; padding: 32px; }
  .frame { background: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border-radius: 12px; overflow: hidden; }
  .lbl { font: 600 11px/1 'Geist'; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(60,50,40,0.6); padding-bottom: 10px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/bold-core.jsx"></script>
<script type="text/babel" src="src/bold-views.jsx"></script>
<script type="text/babel" src="src/bold-app.jsx"></script>
<script type="text/babel" src="src/bold-mobile.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function Preview() {
  return (
    <div className="stage">
      <div>
        <div className="lbl">Masaüstü · Bugün (1320×880)</div>
        <div className="frame"><BoldApp accent="#FF5C5C" density="regular" cardStyle="soft" lang="tr" dark={false} font="geist" /></div>
      </div>
      <div>
        <div className="lbl">Mobil · Bugün</div>
        <div className="frame"><MobileTodayScreen accent="#FF5C5C" /></div>
      </div>
      <div>
        <div className="lbl">Mobil · Görev detayı</div>
        <div className="frame"><MobileDetailScreen accent="#FF5C5C" /></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Preview />);
</script>
</body>
</html>
